name: Monitor Tender Offer Spreads

on:
  schedule:
    # 每天 6:58 北京时间 = UTC 22:58 (前一天)
    # 每天触发，由 is_trading_day() 在代码内过滤节假日/调休
    # (A股有调休周末是交易日的情况，不能只按周一至周五)
    - cron: '58 22 * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python -m src.monitor_main
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}

      # 提交监控流程产生的状态文件（去重记录）
      - name: Commit updated state files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in known_maturity_plays.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "auto: update monitor state"
          git push
