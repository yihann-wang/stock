name: Discover Tender Offers

on:
  schedule:
    # 每个工作日 6:58 北京时间 = UTC 22:58 (前一天)
    # 周一至周五北京时间 = 周日至周四 UTC
    - cron: '58 22 * * 0-4'
    # 每个工作日 13:00 北京时间 = UTC 05:00 (同一天)
    - cron: '0 5 * * 1-5'
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: python -m src.discover_main
        env:
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
          DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}

      # 如果发现新公告，自动提交更新后的去重文件
      - name: Commit updated offers
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          for f in known_offers.json known_extra_announcements.json; do
            [ -f "$f" ] && git add "$f"
          done
          git diff --staged --quiet || git commit -m "auto: update known offers"
          git push
