# ============================================================
# 只推送能赚钱的套利机会，风险/信息性信号全部关闭
# ============================================================

# 要约收购套利阈值
thresholds:
  min_spread_pct: 3.0              # 最小价差收益率(%)
  min_annualized_pct: 30.0         # 最小年化收益率(%)
  warn_days_left: 5                # 截止提醒天数（已禁用，见下）
  min_daily_volume: 500            # 最小日均成交额(万元)

# 公告搜索配置
announcement:
  keyword: "要约收购报告书"
  search_days: 7
  extra_keywords:                  # 吸收合并 = 真套利（换股比例套利）
    - "吸收合并"

# AI 提取配置
extractor:
  model: "gemini-3-flash-preview"
  base_url: "https://jeniya.top/v1"
  max_text_length: 20000

# 可转债转股套利（负溢价 → 买入转股赚差价）
cb_arbitrage:
  enabled: true
  max_premium_rate: -0.5
  min_volume: 1000
  min_bond_price: 0
  max_bond_price: 9999
  max_results: 10

# 可转债打新（100%中签按配售，上市平均涨10-20%）
cb_ipo:
  enabled: true
  days_ahead: 5                  # 提前N天提醒(显示未来N天内的申购机会)
  days_back: 0                   # 向后N天(0=仅显示今天及未来)

# 可转债回售套利（最后2年+正股<70%转股价 → 按面值+利息回售）
cb_putback:
  enabled: true
  max_years_to_expire: 2.0       # 剩余年限上限(回售窗口)
  max_stock_ratio: 72            # 正股/触发价 百分比上限 (70%=触发线)
  min_profit_pct: 0.5            # 最低预期收益率(%)
  min_volume: 500                # 最小成交额(万元)
  estimated_interest: 1.5        # 保守估算当期利息(%)
  max_results: 10

# 可转债强赎预警 - 已禁用（风险提示，不是套利机会）
cb_redemption:
  enabled: false

# AH股溢价监控 - 已禁用（均值回归，不是直接套利）
ah_premium:
  enabled: false

# 要约收购的截止日提醒 / 负价差警告 - 已禁用（非套利）
# 套利信号(spread)仍保留
signals:
  enable_deadline: false
  enable_negative: false

# 可转债无机会时不推送扫描报告
cb_arbitrage_report_when_empty: false

# 通知配置
notification:
  dingtalk:
    enabled: true
