# 信号过滤阈值
thresholds:
  min_spread_pct: 3.0              # 最小价差收益率(%)
  min_annualized_pct: 30.0         # 最小年化收益率(%)
  warn_days_left: 5                # 截止提醒天数
  min_daily_volume: 500            # 最小日均成交额(万元)

# 公告搜索配置
announcement:
  keyword: "要约收购报告书"
  search_days: 7                   # 搜索最近 N 天的公告
  extra_keywords:                  # 额外扫描的公告关键词
    - "转股价格向下修正"
    - "吸收合并"

# AI 提取配置
extractor:
  model: "gemini-3-flash-preview"
  base_url: "https://jeniya.top/v1"
  max_text_length: 20000           # PDF 文本截取长度

# 可转债套利配置
cb_arbitrage:
  enabled: true
  max_premium_rate: -0.5         # 溢价率上限(%), 低于此值才推送(负值=折价)
  min_volume: 1000               # 最小成交额(万元), 过滤流动性差的转债
  min_bond_price: 0               # 最低转债价格(元), 0=不限制
  max_bond_price: 9999            # 最高转债价格(元), 9999=不限制
  max_results: 10                # 最多推送条数

# 可转债强赎预警
cb_redemption:
  enabled: true
  min_convert_value: 125           # 转股价值超过此值预警(130=触发观察区)
  max_convert_value: 150           # 上限，过滤早已超标的陈年老转债
  min_volume: 500                  # 最小成交额(万元)
  max_results: 10

# AH股溢价监控
ah_premium:
  enabled: true
  max_premium: 200                 # 溢价率超过此值推送(A股太贵)
  min_premium: -10                 # 溢价率低于此值推送(A股折价，罕见)
  max_results: 10

# 通知配置
notification:
  dingtalk:
    enabled: true
