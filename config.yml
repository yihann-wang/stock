# ============================================================
# 只推送能赚钱的套利机会，风险/信息性信号全部关闭
# ============================================================

# 要约收购套利阈值
thresholds:
  min_spread_pct: 3.0              # 最小价差收益率(%)
  min_annualized_pct: 30.0         # 最小年化收益率(%)
  warn_days_left: 5                # 截止提醒天数（已禁用，见下）
  min_daily_volume: 500            # 最小日均成交额(万元)

# 公告搜索配置
announcement:
  keyword: "要约收购报告书"
  search_days: 7
  extra_keywords:                  # 吸收合并 = 真套利（换股比例套利）
    - "吸收合并"

# AI 提取配置
extractor:
  model: "gemini-3-flash-preview"
  base_url: "https://jeniya.top/v1"
  max_text_length: 20000

# 可转债转股套利（负溢价 → 买入转股赚差价）
cb_arbitrage:
  enabled: true
  max_premium_rate: -0.5
  min_volume: 1000
  min_bond_price: 0
  max_bond_price: 9999
  max_results: 10

# 可转债到期博弈套利（每周二推送，永久去重）
# 到期1年内+转债价低+高溢价 → 公司有动力下修/拉股价 → 买入博弈
cb_maturity_play:
  enabled: true
  weekly_day: 1                  # 0=周一 1=周二 ... 6=周日
  max_years_to_expire: 1.0       # 剩余年限上限(到期窗口)
  max_bond_price: 200            # 转债价上限
  min_premium_rate: 100          # 溢价率下限(高溢价才有博弈空间)
  min_volume: 200                # 最小成交额(万元)
  max_results: 20

# 可转债手动黑名单（兜底用，正常情况留空）
# 已公告强赎的转债会自动从集思录获取并过滤，不需要在这里维护
cb_blacklist:
  bond_codes: []
  reason: "已公告强赎自动从集思录获取，此处仅用于其他特殊情况兜底"

# 名称纠错映射（东方财富 Name 字段偶有错误，用拼音首字母可验证）
# 格式: {债码: [正确转债名, 正确正股名]}
cb_name_overrides:
  # 东方财富把 300729 错标为"振德股份"，但拼音 LGGF 证实真名是"乐歌股份"
  "123072":
    - "乐歌转债"
    - "乐歌股份"

# 可转债打新（100%中签按配售，上市平均涨10-20%）
cb_ipo:
  enabled: true
  days_ahead: 5                  # 提前N天提醒(显示未来N天内的申购机会)
  days_back: 0                   # 向后N天(0=仅显示今天及未来)

# 可转债回售观察 - 已禁用（仅预警观察，需人工验证连续30天+申报窗口，不是立即可赚）
cb_putback:
  enabled: false

# 可转债强赎预警 - 已禁用（风险提示，不是套利机会）
cb_redemption:
  enabled: false

# AH股溢价监控（每周一次，周二推送）
ah_premium:
  enabled: true
  weekly_day: 1                    # 0=周一 1=周二 ... 6=周日
  max_premium: 200                 # 溢价率超过此值推送(A股太贵)
  min_premium: -10                 # 溢价率低于此值推送(A股折价，罕见)
  max_results: 10

# 要约收购的截止日提醒 / 负价差警告 - 已禁用（非套利）
# 套利信号(spread)仍保留
signals:
  enable_deadline: false
  enable_negative: false

# 可转债无机会时不推送扫描报告
cb_arbitrage_report_when_empty: false

# 通知配置
notification:
  dingtalk:
    enabled: true
